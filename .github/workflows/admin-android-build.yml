name: Build Admin APK

on:
  push:
    paths:
      - 'recargas/admin-app/**'
      - '.github/workflows/admin-android-build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Copy bootstrap.properties
        run: |
          mkdir -p recargas/admin-app/local
          echo "API_BASE_URL=${{ secrets.API_BASE_URL }}" > recargas/admin-app/local/bootstrap.properties
          echo "APP_ADMIN_KEY=${{ secrets.APP_ADMIN_KEY }}" >> recargas/admin-app/local/bootstrap.properties
          echo "DEFAULT_ADMIN_USER=${{ secrets.DEFAULT_ADMIN_USER }}" >> recargas/admin-app/local/bootstrap.properties
          echo "DEFAULT_ADMIN_PASSWORD=${{ secrets.DEFAULT_ADMIN_PASSWORD }}" >> recargas/admin-app/local/bootstrap.properties

      - name: Build APK
        run: gradle -p recargas/admin-app assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: admin-app-release
          path: recargas/admin-app/app/build/outputs/apk/release/*.apk
