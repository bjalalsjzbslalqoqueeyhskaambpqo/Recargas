name: admin-android-build

on:
  workflow_dispatch:
  push:
    branches: ["codex/reorganize-project-structure-for-recargas"]
    paths:
      - 'recargas/admin-app/**'
      - '.github/workflows/admin-android-build.yml'

jobs:
  build-admin-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: recargas/admin-app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: admin-debug-apk
          path: recargas/admin-app/app/build/outputs/apk/debug/*.apk
