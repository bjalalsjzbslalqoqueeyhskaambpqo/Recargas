name: admin-android-build

on:
  workflow_dispatch:
  push:
    branches: ['**']
    paths:
      - 'recargas/admin-app/**'
      - 'recargas/server/**'
      - '.github/workflows/admin-android-build.yml'

jobs:
  build-admin-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Crear archivos locales de entorno
        working-directory: recargas/admin-app
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          APP_ADMIN_KEY: ${{ secrets.APP_ADMIN_KEY }}
          DEFAULT_ADMIN_USER: ${{ secrets.DEFAULT_ADMIN_USER }}
          DEFAULT_ADMIN_PASSWORD: ${{ secrets.DEFAULT_ADMIN_PASSWORD }}
        run: |
          mkdir -p local

          cat > local/bootstrap.properties <<DATA
          API_BASE_URL=${API_BASE_URL:-http://127.0.0.1:3000}
          APP_ADMIN_KEY=${APP_ADMIN_KEY:-REPLACE_APP_KEY}
          DEFAULT_ADMIN_USER=${DEFAULT_ADMIN_USER:-admin}
          DEFAULT_ADMIN_PASSWORD=${DEFAULT_ADMIN_PASSWORD:-admin123456}
          DATA

          cat > local.properties <<DATA
          sdk.dir=$ANDROID_SDK_ROOT
          DATA

      - name: Instalar dependencias Android requeridas
        run: |
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"
          yes | sdkmanager --licenses >/dev/null || true

      - name: Generate signing keystore
        working-directory: recargas/admin-app
        run: |
          KEY_ALIAS="upload"
          KEYSTORE_FILE="$PWD/android-signing.jks"
          STORE_PASS="$(openssl rand -base64 24 | tr -dc 'A-Za-z0-9' | head -c 20)"

          keytool -genkeypair \
            -v \
            -storetype JKS \
            -keystore "$KEYSTORE_FILE" \
            -alias "$KEY_ALIAS" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 3650 \
            -storepass "$STORE_PASS" \
            -keypass "$STORE_PASS" \
            -dname "CN=RecargasAdmin, OU=Mobile, O=Recargas, L=NA, S=NA, C=US"

          echo "KEYSTORE_FILE=$KEYSTORE_FILE" >> "$GITHUB_ENV"
          echo "KEY_ALIAS=$KEY_ALIAS" >> "$GITHUB_ENV"
          echo "STORE_PASS=$STORE_PASS" >> "$GITHUB_ENV"

          cat > signing-data.txt <<DATA
          keystore_file=$KEYSTORE_FILE
          key_alias=$KEY_ALIAS
          store_password=$STORE_PASS
          key_password=$STORE_PASS
          DATA

      - name: Build signed release APK
        run: |
          gradle -p recargas/admin-app assembleRelease \
            -Pandroid.injected.signing.store.file="$KEYSTORE_FILE" \
            -Pandroid.injected.signing.store.password="$STORE_PASS" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$STORE_PASS"

      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: admin-signed-release-apk
          path: recargas/admin-app/app/build/outputs/apk/release/*.apk

      - name: Upload signing data
        uses: actions/upload-artifact@v4
        with:
          name: admin-signing-data
          path: |
            recargas/admin-app/android-signing.jks
            recargas/admin-app/signing-data.txt
