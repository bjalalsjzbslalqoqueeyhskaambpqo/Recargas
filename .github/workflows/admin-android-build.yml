name: admin-android-build

on:
  workflow_dispatch:
  push:
    branches: ['**']
    paths:
      - 'recargas/admin-app/**'
      - '.github/workflows/admin-android-build.yml'

jobs:
  build-admin-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate signing keystore
        working-directory: recargas/admin-app
        run: |
          KEY_ALIAS="upload"
          KEYSTORE_FILE="$PWD/android-signing.jks"
          STORE_PASS="$(openssl rand -base64 24 | tr -dc 'A-Za-z0-9' | head -c 20)"

          # En JKS usamos misma password de store y key para evitar padding/key mismatch.
          keytool -genkeypair \
            -v \
            -storetype JKS \
            -keystore "$KEYSTORE_FILE" \
            -alias "$KEY_ALIAS" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 3650 \
            -storepass "$STORE_PASS" \
            -keypass "$STORE_PASS" \
            -dname "CN=RecargasAdmin, OU=Mobile, O=Recargas, L=NA, S=NA, C=US"

          echo "KEYSTORE_FILE=$KEYSTORE_FILE" >> "$GITHUB_ENV"
          echo "KEY_ALIAS=$KEY_ALIAS" >> "$GITHUB_ENV"
          echo "STORE_PASS=$STORE_PASS" >> "$GITHUB_ENV"

          cat > signing-data.txt <<DATA
          keystore_file=$KEYSTORE_FILE
          key_alias=$KEY_ALIAS
          store_password=$STORE_PASS
          key_password=$STORE_PASS
          DATA

      - name: Build signed release APK
        run: |
          gradle -p recargas/admin-app assembleRelease \
            -Pandroid.injected.signing.store.file="$KEYSTORE_FILE" \
            -Pandroid.injected.signing.store.password="$STORE_PASS" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$STORE_PASS"

      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: admin-signed-release-apk
          path: recargas/admin-app/app/build/outputs/apk/release/*.apk

      - name: Upload signing data
        uses: actions/upload-artifact@v4
        with:
          name: admin-signing-data
          path: |
            recargas/admin-app/android-signing.jks
            recargas/admin-app/signing-data.txt
