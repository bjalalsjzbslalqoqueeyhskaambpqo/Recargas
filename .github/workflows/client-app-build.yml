name: client-android-build

on:
  workflow_dispatch:
  push:
    branches: ['**']
    paths:
      - 'recargas/client-android-app/**'
      - 'recargas/server/**'
      - '.github/workflows/client-app-build.yml'

jobs:
  build-client-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Crear/actualizar bootstrap local cliente
        working-directory: recargas/client-android-app
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          APP_CLIENT_KEY: ${{ secrets.APP_CLIENT_KEY }}
          DEFAULT_CLIENT_USER: ${{ secrets.DEFAULT_CLIENT_USER }}
        run: |
          mkdir -p local
          BOOTSTRAP_FILE="local/bootstrap.properties"

          if [ ! -f "$BOOTSTRAP_FILE" ]; then
            printf '%s\n' \
              'API_BASE_URL=http://127.0.0.1:3000' \
              'APP_CLIENT_KEY=REPLACE_APP_KEY' \
              'DEFAULT_CLIENT_USER=cliente_demo' \
              > "$BOOTSTRAP_FILE"
          fi

          set_prop() {
            key="$1"
            value="$2"
            if [ -z "$value" ]; then
              return
            fi

            if grep -q "^${key}=" "$BOOTSTRAP_FILE"; then
              sed -i "s#^${key}=.*#${key}=${value}#" "$BOOTSTRAP_FILE"
            else
              printf '%s=%s\n' "$key" "$value" >> "$BOOTSTRAP_FILE"
            fi
          }

          # Solo sobreescribir con secretos si realmente existen.
          set_prop "API_BASE_URL" "$API_BASE_URL"
          set_prop "APP_CLIENT_KEY" "$APP_CLIENT_KEY"
          set_prop "DEFAULT_CLIENT_USER" "$DEFAULT_CLIENT_USER"

          echo "bootstrap usado:"
          cat "$BOOTSTRAP_FILE"

          printf '%s\n' "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Instalar dependencias Android requeridas
        run: |
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"
          yes | sdkmanager --licenses >/dev/null || true

      - name: Generate signing keystore
        working-directory: recargas/client-android-app
        run: |
          KEY_ALIAS="upload"
          KEYSTORE_FILE="$PWD/android-signing.jks"
          STORE_PASS="$(openssl rand -base64 24 | tr -dc 'A-Za-z0-9' | head -c 20)"

          keytool -genkeypair \
            -v \
            -storetype JKS \
            -keystore "$KEYSTORE_FILE" \
            -alias "$KEY_ALIAS" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 3650 \
            -storepass "$STORE_PASS" \
            -keypass "$STORE_PASS" \
            -dname "CN=RecargasClient, OU=Mobile, O=Recargas, L=NA, S=NA, C=US"

          echo "KEYSTORE_FILE=$KEYSTORE_FILE" >> "$GITHUB_ENV"
          echo "KEY_ALIAS=$KEY_ALIAS" >> "$GITHUB_ENV"
          echo "STORE_PASS=$STORE_PASS" >> "$GITHUB_ENV"

          cat > signing-data.txt <<DATA
          keystore_file=$KEYSTORE_FILE
          key_alias=$KEY_ALIAS
          store_password=$STORE_PASS
          key_password=$STORE_PASS
          DATA

      - name: Build signed release APK cliente
        run: |
          gradle -p recargas/client-android-app assembleRelease \
            -Pandroid.injected.signing.store.file="$KEYSTORE_FILE" \
            -Pandroid.injected.signing.store.password="$STORE_PASS" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$STORE_PASS"

      - name: Upload client signed APK
        uses: actions/upload-artifact@v4
        with:
          name: client-signed-release-apk
          path: recargas/client-android-app/app/build/outputs/apk/release/*.apk

      - name: Upload client signing data
        uses: actions/upload-artifact@v4
        with:
          name: client-signing-data
          path: |
            recargas/client-android-app/android-signing.jks
            recargas/client-android-app/signing-data.txt
