name: Build btserver binaries

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y build-essential pkg-config libssl-dev

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Extract Cargo.toml and source files from script
        run: |
          mkdir -p btsrc/src/bin

          # Extraer Cargo.toml
          sed -n '/^cat > "\$PROJ\/Cargo.toml"/,/^TOMLEOF$/{ /^cat /d; /^TOMLEOF$/d; p }' Rusthevsocks5.sh > btsrc/Cargo.toml

          # Extraer btserver.rs
          sed -n "/^cat > \"\$PROJ\/src\/bin\/btserver.rs\"/,/^RSEOF\$/"'{ /^cat /d; /^RSEOF$/d; p }' Rusthevsocks5.sh > btsrc/src/bin/btserver.rs

          # Extraer panel.rs
          sed -n "/^cat > \"\$PROJ\/src\/bin\/panel.rs\"/,/^RSEOF\$/"'{ /^cat /d; /^RSEOF$/d; p }' Rusthevsocks5.sh > btsrc/src/bin/panel.rs

          echo "--- Cargo.toml preview ---"
          head -10 btsrc/Cargo.toml
          echo "--- btserver.rs lines ---"
          wc -l btsrc/src/bin/btserver.rs
          echo "--- panel.rs lines ---"
          wc -l btsrc/src/bin/panel.rs

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            btsrc/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('btsrc/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build release binaries
        working-directory: btsrc
        run: cargo build --release

      - name: Prepare artifacts
        run: |
          mkdir -p dist
          cp btsrc/target/release/btserver dist/btserver
          cp btsrc/target/release/panel    dist/panel
          chmod +x dist/btserver dist/panel
          ls -lh dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: btserver-binaries
          path: dist/
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Build #${{ github.run_number }}"
          body: |
            Binarios compilados automáticamente desde `Rusthevsocks5.sh`
            Commit: ${{ github.sha }}
          files: |
            dist/btserver
            dist/panel
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
