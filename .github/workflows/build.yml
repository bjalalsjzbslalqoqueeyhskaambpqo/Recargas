name: Build btserver binaries

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: debian:12

    steps:
      - name: Install system dependencies
        run: |
          apt-get update -qq
          apt-get install -y build-essential pkg-config libssl-dev curl git ca-certificates

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Rust stable
        run: |
          curl https://sh.rustup.rs -sSf | sh -s -- -y --profile minimal --default-toolchain stable
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Prepare source tree
        run: |
          mkdir -p btsrc/src/bin

          # Si existen archivos .rs sueltos en el repo, usarlos directamente
          if [ -f Cargo.toml ] && [ -f btserver.rs ]; then
            echo "Usando archivos fuente del repo directamente"
            cp Cargo.toml btsrc/Cargo.toml
            cp btserver.rs btsrc/src/bin/btserver.rs
            # panel.rs: del repo si existe, si no extraer del script
            if [ -f panel.rs ]; then
              cp panel.rs btsrc/src/bin/panel.rs
            else
              sed -n "/^cat > \"\$PROJ\/src\/bin\/panel.rs\"/,/^RSEOF\$/"'{ /^cat /d; /^RSEOF$/d; p }' Rusthevsocks5.sh > btsrc/src/bin/panel.rs
            fi
          else
            echo "Extrayendo fuentes del script .sh"
            sed -n '/^cat > "\$PROJ\/Cargo.toml"/,/^TOMLEOF$/{ /^cat /d; /^TOMLEOF$/d; p }' Rusthevsocks5.sh > btsrc/Cargo.toml
            sed -n "/^cat > \"\$PROJ\/src\/bin\/btserver.rs\"/,/^RSEOF\$/"'{ /^cat /d; /^RSEOF$/d; p }' Rusthevsocks5.sh > btsrc/src/bin/btserver.rs
            sed -n "/^cat > \"\$PROJ\/src\/bin\/panel.rs\"/,/^RSEOF\$/"'{ /^cat /d; /^RSEOF$/d; p }' Rusthevsocks5.sh > btsrc/src/bin/panel.rs
          fi

          echo "--- Cargo.toml ---"
          cat btsrc/Cargo.toml
          echo "--- btserver.rs lines: $(wc -l < btsrc/src/bin/btserver.rs)"
          echo "--- panel.rs lines:    $(wc -l < btsrc/src/bin/panel.rs)"

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            btsrc/target
          key: debian12-cargo-${{ hashFiles('btsrc/Cargo.toml') }}
          restore-keys: |
            debian12-cargo-

      - name: Build release binaries
        working-directory: btsrc
        run: ~/.cargo/bin/cargo build --release 2>&1

      - name: Prepare artifacts
        run: |
          mkdir -p dist
          cp btsrc/target/release/btserver dist/btserver
          cp btsrc/target/release/panel    dist/panel
          chmod +x dist/btserver dist/panel
          ls -lh dist/
          ldd dist/btserver | grep libc

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: btserver-binaries-debian12
          path: dist/
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Build #${{ github.run_number }} (Debian 12)"
          body: |
            Binarios compilados en Debian 12 (GLIBC 2.36)
            Kernel mínimo requerido: cualquier Linux x86_64
            Commit: ${{ github.sha }}
          files: |
            dist/btserver
            dist/panel
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
