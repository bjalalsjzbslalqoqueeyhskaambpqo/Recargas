name: Build btserver binaries

on:
  push:
    branches: [ stable ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: debian:11

    steps:
      - name: Install system dependencies
        run: |
          apt-get update -qq
          apt-get install -y build-essential pkg-config libssl-dev curl git ca-certificates

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Rust stable
        run: |
          curl https://sh.rustup.rs -sSf | sh -s -- -y --profile minimal --default-toolchain stable
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Extract source files from script
        run: |
          mkdir -p btsrc/src/bin
          sed -n '/^cat > "\$PROJ\/Cargo.toml"/,/^TOMLEOF$/{ /^cat /d; /^TOMLEOF$/d; p }' Rusthevsocks5.sh > btsrc/Cargo.toml
          sed -n "/^cat > \"\$PROJ\/src\/bin\/btserver.rs\"/,/^RSEOF\$/"'{ /^cat /d; /^RSEOF$/d; p }' Rusthevsocks5.sh > btsrc/src/bin/btserver.rs
          sed -n "/^cat > \"\$PROJ\/src\/bin\/panel.rs\"/,/^RSEOF\$/"'{ /^cat /d; /^RSEOF$/d; p }' Rusthevsocks5.sh > btsrc/src/bin/panel.rs
          echo "--- Cargo.toml preview ---"
          head -10 btsrc/Cargo.toml
          echo "--- btserver.rs lines ---"
          wc -l btsrc/src/bin/btserver.rs
          echo "--- panel.rs lines ---"
          wc -l btsrc/src/bin/panel.rs

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            btsrc/target
          key: debian11-cargo-${{ hashFiles('btsrc/Cargo.toml') }}
          restore-keys: |
            debian11-cargo-

      - name: Build release binaries
        working-directory: btsrc
        run: ~/.cargo/bin/cargo build --release

      - name: Prepare artifacts
        run: |
          mkdir -p dist
          cp btsrc/target/release/btserver dist/btserver
          cp btsrc/target/release/panel    dist/panel
          chmod +x dist/btserver dist/panel
          ls -lh dist/
          ldd dist/btserver | grep libc

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: btserver-binaries-debian11
          path: dist/
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Build #${{ github.run_number }} (Debian 11)"
          body: |
            Binarios compilados en Debian 11 (GLIBC 2.31)
            Commit: ${{ github.sha }}
          files: |
            dist/btserver
            dist/panel
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
