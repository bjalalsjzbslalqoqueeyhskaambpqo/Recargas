<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Recargas</title>
  <style>
    body{font-family:Arial,sans-serif;background:#f4f6f8;margin:0;color:#222}
    .container{max-width:700px;margin:0 auto;padding:20px}
    .card{background:#fff;border-radius:10px;padding:16px;margin:12px 0;box-shadow:0 2px 8px rgba(0,0,0,.08)}
    input,select,button{width:100%;padding:10px;border:1px solid #d0d5dd;border-radius:8px;margin-top:6px}
    button{background:#1458d6;color:#fff;border:none;font-weight:600;cursor:pointer}
    button:disabled{background:#90a4c9;cursor:not-allowed}
    .hidden{display:none}
    .status{padding:10px;border-radius:8px;margin-top:10px}
    .ok{background:#e6f4ea;color:#1f7a34}
    .err{background:#fde8e8;color:#b42318}
    .proc{background:#e8f1fe;color:#1d4ed8}
  </style>
</head>
<body>
  <div class="container">
    <div id="loginCard" class="card">
      <h2>Ingresar</h2>
      <label>Usuario</label>
      <input id="loginUser" type="text" autocomplete="username" />
      <label>Contraseña</label>
      <input id="loginPass" type="password" autocomplete="current-password" />
      <button onclick="login()">Entrar</button>
      <div id="loginMsg"></div>
    </div>

    <div id="app" class="hidden">
      <div class="card">
        <strong id="userInfo"></strong>
        <div>Saldo: $<span id="saldo">0</span></div>
        <button onclick="logout()">Cerrar sesión</button>
      </div>

      <div class="card">
        <h3>Nueva recarga</h3>
        <label>Servicio</label>
        <select id="servicioSelect" onchange="cargarUiServicio()"></select>

        <div id="serviceUi" style="margin-top:10px"></div>

        <label>Monto</label>
        <select id="montoSelect"></select>
        <input id="montoLibre" type="number" min="1" step="1" placeholder="Monto" class="hidden" />

        <button id="btnRecargar" onclick="recargar()">Enviar recarga</button>
        <div id="resultado"></div>
      </div>

      <div class="card">
        <h3>Historial</h3>
        <table style="width:100%;font-size:14px">
          <thead><tr><th>Fecha</th><th>Servicio</th><th>Ref.</th><th>Monto</th><th>Estado</th></tr></thead>
          <tbody id="historialBody"></tbody>
        </table>
      </div>
    </div>
  </div>
<script>
let token = localStorage.getItem('userToken')
let userName = localStorage.getItem('userName')
let servicios = []

if (token) iniciar()

async function api(url, method='GET', body) {
  const opts = { method, headers: { 'Content-Type':'application/json', Authorization: `Bearer ${token}` } }
  if (body) opts.body = JSON.stringify(body)

  const resp = await fetch(url, opts)
  const type = resp.headers.get('content-type') || ''

  if (type.includes('text/html')) {
    if (!resp.ok) throw new Error('No se pudo cargar la interfaz del servicio.')
    return resp.text()
  }

  const data = await resp.json().catch(() => ({}))
  if (!resp.ok) throw new Error(data.error || 'Error de servidor.')
  return data
}

function show(targetId, msg, style='err') {
  document.getElementById(targetId).innerHTML = `<div class="status ${style}">${msg}</div>`
}

async function login() {
  const usuario = document.getElementById('loginUser').value.trim()
  const password = document.getElementById('loginPass').value

  try {
    const r = await fetch('/api/login', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ usuario, password })
    }).then(r => r.json())

    if (!r.token) throw new Error(r.error || 'Credenciales inválidas.')

    token = r.token
    userName = usuario
    localStorage.setItem('userToken', token)
    localStorage.setItem('userName', userName)
    await iniciar()
  } catch (error) {
    show('loginMsg', error.message, 'err')
  }
}

function logout() {
  localStorage.removeItem('userToken')
  localStorage.removeItem('userName')
  location.reload()
}

async function iniciar() {
  document.getElementById('loginCard').classList.add('hidden')
  document.getElementById('app').classList.remove('hidden')
  document.getElementById('userInfo').textContent = `Usuario: ${userName}`

  await Promise.all([cargarServicios(), cargarSaldo(), cargarHistorial()])
}

async function cargarServicios() {
  servicios = await api('/api/servicios')
  const select = document.getElementById('servicioSelect')

  if (!servicios.length) {
    select.innerHTML = ''
    document.getElementById('serviceUi').innerHTML = '<p>No hay servicios disponibles.</p>'
    document.getElementById('btnRecargar').disabled = true
    return
  }

  select.innerHTML = servicios.map(s => `<option value="${s.id}">${s.nombre}</option>`).join('')
  document.getElementById('btnRecargar').disabled = false
  await cargarUiServicio()
}

async function cargarUiServicio() {
  const servicioId = document.getElementById('servicioSelect').value
  const servicio = servicios.find(s => s.id === servicioId)
  const html = await api(`/api/servicios/${servicioId}/ui`)
  document.getElementById('serviceUi').innerHTML = html

  const montoSelect = document.getElementById('montoSelect')
  const montoLibre = document.getElementById('montoLibre')
  if (servicio?.montos?.length) {
    montoSelect.classList.remove('hidden')
    montoLibre.classList.add('hidden')
    montoSelect.innerHTML = servicio.montos.map(m => `<option value="${m}">$${m}</option>`).join('')
  } else {
    montoSelect.classList.add('hidden')
    montoLibre.classList.remove('hidden')
    montoLibre.value = ''
  }
}

async function recargar() {
  const btn = document.getElementById('btnRecargar')
  const servicio = document.getElementById('servicioSelect').value
  const referencia = document.getElementById('serviceInput')?.value?.trim() || ''

  const visibleMontoSelect = !document.getElementById('montoSelect').classList.contains('hidden')
  const monto = visibleMontoSelect
    ? Number(document.getElementById('montoSelect').value)
    : Number(document.getElementById('montoLibre').value)

  btn.disabled = true
  show('resultado', 'Procesando recarga...', 'proc')

  try {
    const r = await api('/api/recargar', 'POST', { servicio, referencia, monto })
    show('resultado', r.mensaje, r.ok ? 'ok' : 'err')
    await cargarSaldo()
    await cargarHistorial()
  } catch (error) {
    show('resultado', error.message, 'err')
  } finally {
    btn.disabled = false
  }
}

async function cargarSaldo() {
  const r = await api('/api/saldo')
  document.getElementById('saldo').textContent = Number(r.saldo || 0).toFixed(2)
}

async function cargarHistorial() {
  const rows = await api('/api/historial')
  const tbody = document.getElementById('historialBody')

  if (!rows.length) {
    tbody.innerHTML = '<tr><td colspan="5">Sin recargas.</td></tr>'
    return
  }

  tbody.innerHTML = rows.map(h => `<tr><td>${h.fecha}</td><td>${h.servicio}</td><td>${h.referencia}</td><td>$${h.monto}</td><td>${h.estado}</td></tr>`).join('')
}
</script>
</body>
</html>
